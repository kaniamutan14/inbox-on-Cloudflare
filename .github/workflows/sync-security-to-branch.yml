name: Sync Dependabot Security PRs

on:
  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged PR number (e.g. 42)'
        required: true
      dependabot_sha:
        description: 'Dependabot commit SHA (NOT the merge commit)'
        required: true

jobs:
  cherry-pick-to-other-branch:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.user.login == 'dependabot[bot]')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cherry-pick to target branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # ⬇️ CHANGE THIS to your other branch name ⬇️
          TARGET_BRANCH="your-other-branch"
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_TITLE="Manual sync test"
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            # Use the input SHA
            TARGET_SHA="${{ github.event.inputs.dependabot_sha }}"
          else
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            # Grab Dependabot's specific commit (the "head" of its branch), not the merge commit
            TARGET_SHA="${{ github.event.pull_request.head.sha }}"
          fi

          SHORT_SHA="${TARGET_SHA:0:8}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout "$TARGET_BRANCH"
          git checkout -b "dependabot-sync/$SHORT_SHA"

          # Now cherry-picking the clean Dependabot commit
          if git cherry-pick "$TARGET_SHA" --no-commit; then
            git commit -m "chore(deps): sync security update - $PR_TITLE"
            git push origin "dependabot-sync/$SHORT_SHA"
            gh pr create \
              --base "$TARGET_BRANCH" \
              --head "dependabot-sync/$SHORT_SHA" \
              --title "[Security Sync] $PR_TITLE" \
              --body "🔒 Auto-cherry-picked security update from main.

          Original PR: #$PR_NUMBER"
            echo "✅ PR created successfully"
          else
            git cherry-pick --abort
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ **Auto-sync failed** — could not cherry-pick this security update to \`$TARGET_BRANCH\` due to merge conflicts.

          Please cherry-pick manually:
          \`\`\`
          git checkout $TARGET_BRANCH
          git cherry-pick $TARGET_SHA
          \`\`\`"
            echo "❌ Cherry-pick failed due to conflicts"
          fi
